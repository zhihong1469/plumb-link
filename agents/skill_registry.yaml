# Plumb-Link 技能注册表

本文件定义了 plumb-link 仓库中所有技能的元数据，供大模型查询和调用技能。

---

skills:
  # ── 软件技能 ───────────────────────────────────────────────────────────────
  - name: build-linux-app
    category: software
    version: 1.0.0
    description: "编译 Linux 应用程序，支持 x86_64 本地编译和 ARM64 交叉编译"
    keywords:
      - "编译"
      - "build"
      - "make"
      - "cmake"
      - "构建"
      - "交叉编译"
      - "arm64"
    agents:
      - openai
      - claude
      - trae
    shared_deps:
      - tool_config
      - build_utils
    platforms:
      - linux
      - windows
      - macos
    required_tools:
      - gcc
      - make
    optional_tools:
      - cmake
      - ninja
      - aarch64-linux-gnu-gcc
    author: "Plumb-Link Team"
    license: "MIT"
    status: "stable"

  - name: git-commit
